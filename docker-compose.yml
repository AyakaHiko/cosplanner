services:
  cosplanner.backend:
    build:
      context: cosplanner-back
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./cosplanner-back:/var/www/html/
    command: php artisan serve --host=0.0.0.0 --port=8000
  cosplanner.frontend:
    build:
      context: ./cosplanner-front
      dockerfile: Dockerfile.dev
    container_name: cosplanner-front
    ports:
      - "5173:5173"
    volumes:
      - ./cosplanner-front:/front
  cosplanner.db:
    image: postgres:16
    container_name: cosplanner-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
volumes:
  db_postgres_data:
