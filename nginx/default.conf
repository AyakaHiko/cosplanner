server{
    listen 80;
    server_name cosplanner;

    root /var/www/frontend;
    index index.html;

    location / {
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $host;
          proxy_pass http://cosplanner-front:5173;
        }
    location /api/ {
        proxy_pass http://cosplanner.backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}